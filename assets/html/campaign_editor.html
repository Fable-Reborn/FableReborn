<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FableReborn Campaign Studio</title>
  <style>
    :root { color-scheme: dark; --bg:#120f0d; --panel:#1e1915; --panel2:#29211b; --line:#49382b; --gold:#d6a85f; --text:#f3e9dc; --muted:#ad9c8d; --bad:#e36b6b; --good:#70c28b; }
    * { box-sizing:border-box; }
    body { margin:0; background:linear-gradient(135deg,#0d0b09,#1b1511); color:var(--text); font:14px/1.4 system-ui,sans-serif; }
    button,input,textarea,select { font:inherit; }
    button { cursor:pointer; border:1px solid var(--line); background:#35291f; color:var(--text); border-radius:7px; padding:8px 11px; }
    button:hover { border-color:var(--gold); }
    button.primary { background:#765124; border-color:#b88742; }
    button.danger { color:#ffd8d8; border-color:#743b3b; }
    header { height:62px; display:flex; align-items:center; gap:10px; padding:0 18px; border-bottom:1px solid var(--line); background:#17120f; position:sticky; top:0; z-index:3; }
    header h1 { font-size:18px; margin:0 auto 0 0; color:var(--gold); }
    .layout { display:grid; grid-template-columns:270px minmax(520px,1fr) 330px; min-height:calc(100vh - 62px); }
    aside,.inspector { background:rgba(30,25,21,.96); padding:14px; overflow:auto; }
    aside { border-right:1px solid var(--line); }
    .inspector { border-left:1px solid var(--line); }
    main { padding:18px; overflow:auto; }
    .tabs { display:flex; gap:6px; margin-bottom:14px; }
    .tabs button.active { background:#765124; border-color:var(--gold); }
    .section { border:1px solid var(--line); background:var(--panel); border-radius:10px; padding:14px; margin-bottom:14px; }
    .section h2,.section h3 { color:var(--gold); margin:0 0 12px; }
    .section h2 { font-size:18px; }.section h3 { font-size:15px; }
    label { display:block; color:var(--muted); margin-bottom:5px; }
    input,textarea,select { width:100%; border:1px solid var(--line); background:#100d0b; color:var(--text); border-radius:6px; padding:8px; }
    textarea { min-height:82px; resize:vertical; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .field { margin-bottom:10px; }
    .list { display:flex; flex-direction:column; gap:6px; }
    .list-item { text-align:left; width:100%; padding:9px; background:var(--panel2); }
    .list-item.active { border-color:var(--gold); box-shadow:inset 3px 0 var(--gold); }
    .node-kind { color:var(--muted); font-size:11px; text-transform:uppercase; }
    .flow-arrow { color:#7f6b59; padding-left:12px; font-size:12px; }
    .row { border:1px solid var(--line); border-radius:8px; padding:10px; margin:8px 0; background:#171310; }
    .row-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .row-head strong { margin-right:auto; }
    .mini { padding:5px 8px; font-size:12px; }
    .status { border-radius:7px; padding:9px; margin-top:10px; white-space:pre-wrap; }
    .status.good { background:#173421; color:#b9efc8; }.status.bad { background:#3a1919; color:#ffd0d0; }
    .pill { display:inline-block; border:1px solid var(--line); border-radius:999px; padding:2px 7px; color:var(--muted); margin:2px; font-size:11px; }
    .empty { color:var(--muted); padding:20px; text-align:center; border:1px dashed var(--line); border-radius:8px; }
    .check { display:flex; align-items:center; gap:8px; }
    .check input { width:auto; }
    pre { white-space:pre-wrap; overflow-wrap:anywhere; color:#d9c9b8; }
    @media (max-width:1100px) { .layout { grid-template-columns:230px 1fr; }.inspector { display:none; } }
  </style>
</head>
<body>
<header>
  <h1>FableReborn Campaign Studio</h1>
  <input id="fileInput" type="file" accept="application/json,.json" hidden>
  <button onclick="fileInput.click()">Import JSON</button>
  <button onclick="validateAndShow()">Validate</button>
  <button class="primary" onclick="downloadPackage()">Download Bot JSON</button>
</header>
<div class="layout">
  <aside>
    <div class="tabs">
      <button id="tabCampaign" class="active" onclick="setTab('campaign')">Flow</button>
      <button id="tabQuests" onclick="setTab('quests')">Quests</button>
      <button id="tabMonsters" onclick="setTab('monsters')">Monsters</button>
      <button id="tabJson" onclick="setTab('json')">JSON</button>
    </div>
    <div id="sidebar"></div>
  </aside>
  <main id="main"></main>
  <div class="inspector" id="inspector"></div>
</div>
<datalist id="monsterNames"></datalist>
<script>
const SCHEMA='fablereborn.campaign-package';
const sources=['none','pve','adventure','battletower','dragonparty','cbt','raidbattle','jurytower','scripted'];
const conditionTypes=['quest_completed','campaign_completed','campaign_choice','reputation','level','class','god','race','money','guild_member','item_owned','item_equipped','pet_owned','pet_equipped','badge','unlock'];
const encounterKinds=['none','pve','battle_tower','dragon_party','raid_battle','jury_tower','external_command'];
const rewardTypes=['none','money','crate','item','egg','bundle'];
let data=blankPackage(), tab='campaign', selectedCampaign=0, selectedNode=0, selectedQuest=0, selectedMonster=0;

function blankPackage(){return {schema:SCHEMA,schema_version:1,exported_at:new Date().toISOString(),campaigns:[],standalone_quests:[],cutscenes:[],monsters:[],reference:{}}}
function keyify(v){return String(v||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function q(v){return esc(v).replace(/\n/g,'&#10;')}
function currentCampaign(){return data.campaigns[selectedCampaign]||null}
function currentNode(){let c=currentCampaign();return c?(c.nodes||[])[selectedNode]||null:null}
function ensureCampaign(c){c.key=keyify(c.key);c.title=c.title||'Untitled Campaign';c.description=c.description||'';c.start_node=keyify(c.start_node);c.is_active=!!c.is_active;c.requirements=c.requirements||[];c.nodes=c.nodes||[];c.nodes.forEach(ensureNode)}
function ensureNode(n){n.id=keyify(n.id);n.type=n.type||'quest';n.title=n.title||'Untitled Chapter';n.description=n.description||'';n.requirements=n.requirements||[];n.next=n.next||[];n.options=n.options||[];n.unlocks=n.unlocks||[];n.effects=n.effects||[];n.quest=n.quest||{};n.cutscenes=n.cutscenes||{};n.encounter=n.encounter||{kind:'none',party:{min:1,max:1},settings:{}}}
function options(values,selected){return values.map(v=>`<option value="${q(v)}" ${v===selected?'selected':''}>${esc(v.replaceAll('_',' '))}</option>`).join('')}
function field(label,value,onchange,type='text'){return `<div class="field"><label>${esc(label)}</label><input type="${type}" value="${q(value)}" onchange="${onchange}"></div>`}
function area(label,value,onchange){return `<div class="field"><label>${esc(label)}</label><textarea onchange="${onchange}">${esc(value)}</textarea></div>`}
function selectField(label,values,value,onchange){return `<div class="field"><label>${esc(label)}</label><select onchange="${onchange}">${options(values,value)}</select></div>`}
function parseJSON(text,fallback){try{return JSON.parse(text)}catch{return fallback}}
function setTab(next){tab=next;document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));document.getElementById(next==='campaign'?'tabCampaign':next==='quests'?'tabQuests':next==='monsters'?'tabMonsters':'tabJson').classList.add('active');render()}

function render(){data.campaigns.forEach(ensureCampaign);renderMonsterList();renderSidebar();if(tab==='campaign')renderCampaign();else if(tab==='quests')renderStandaloneQuest();else if(tab==='monsters')renderMonster();else renderJson();renderInspector()}
function renderMonsterList(){monsterNames.innerHTML=data.monsters.map(m=>`<option value="${q(m.name)}"></option>`).join('')}
function renderSidebar(){
  if(tab==='quests'){
    sidebar.innerHTML=`<button class="primary" style="width:100%;margin-bottom:10px" onclick="addStandaloneQuest()">+ New Standalone Quest</button><div class="list">${(data.standalone_quests||[]).map((qst,i)=>`<button class="list-item ${i===selectedQuest?'active':''}" onclick="selectedQuest=${i};render()"><strong>${esc(qst.name||'Unnamed Quest')}</strong><div class="node-kind">${esc(qst.quest_key||'no key')}</div></button>`).join('')}</div>`;return;
  }
  if(tab==='monsters'){
    sidebar.innerHTML=`<button class="primary" style="width:100%;margin-bottom:10px" onclick="addMonster()">+ New Monster</button><div class="list">${data.monsters.map((m,i)=>`<button class="list-item ${i===selectedMonster?'active':''}" onclick="selectedMonster=${i};render()"><strong>${esc(m.name||'Unnamed')}</strong><div class="node-kind">Tier ${esc(m.tier||1)} ${esc(m.element||'')}</div></button>`).join('')}</div>`;return;
  }
  if(tab==='json'){sidebar.innerHTML=`<div class="empty">Raw package view. Paste or inspect the complete file.</div>`;return}
  let c=currentCampaign();
  sidebar.innerHTML=`<button class="primary" style="width:100%;margin-bottom:10px" onclick="addCampaign()">+ New Campaign</button><div class="list">${data.campaigns.map((x,i)=>`<button class="list-item ${i===selectedCampaign?'active':''}" onclick="selectedCampaign=${i};selectedNode=0;render()"><strong>${esc(x.title)}</strong><div class="node-kind">${esc(x.key||'no key')}</div></button>`).join('')}</div>${c?`<hr style="border-color:var(--line)"><button style="width:100%;margin-bottom:8px" onclick="addNode()">+ Add Node</button><div class="list">${(c.nodes||[]).map((n,i)=>`${i?'<div class="flow-arrow">then / branch</div>':''}<button class="list-item ${i===selectedNode?'active':''}" onclick="selectedNode=${i};render()"><strong>${esc(n.title)}</strong><div class="node-kind">${esc(n.type)} - ${esc(n.id)}</div></button>`).join('')}</div>`:''}`;
}

function addCampaign(){data.campaigns.push({key:'new_campaign',title:'New Campaign',description:'',start_node:'opening',is_active:false,requirements:[],nodes:[newNode('opening')]});selectedCampaign=data.campaigns.length-1;selectedNode=0;render()}
function newNode(id){return {id,key:keyify(id),type:'quest',title:'Opening Chapter',description:'',requirements:[],quest:{quest_key:'',category:'Campaign',offer_text:'',turnin_text:'',objective:{source:'pve',mode:'progress',required_count:1,target_name:''},turnin:{type:'progress'},reward:{type:'none'},requirements:[],prerequisites:[],is_active:true},cutscenes:{},encounter:{kind:'none',name:'',monster:'',party:{min:1,max:1},launch_command:'',settings:{}},next:[],options:[],effects:[],unlocks:[]}}
function addNode(){let c=currentCampaign();let id='chapter_'+((c.nodes||[]).length+1);c.nodes.push(newNode(id));selectedNode=c.nodes.length-1;if(!c.start_node)c.start_node=id;render()}
function deleteCampaign(){if(!confirm('Delete this campaign from the editor?'))return;data.campaigns.splice(selectedCampaign,1);selectedCampaign=Math.max(0,selectedCampaign-1);selectedNode=0;render()}
function deleteNode(){let c=currentCampaign();if(!confirm('Delete this node? Transitions to it will become invalid.'))return;c.nodes.splice(selectedNode,1);selectedNode=Math.max(0,selectedNode-1);render()}

function renderCampaign(){
  let c=currentCampaign();if(!c){main.innerHTML='<div class="empty">Create or import a campaign to begin.</div>';return}
  let n=currentNode();
  main.innerHTML=`<div class="section"><div class="row-head"><h2>Campaign</h2><button class="danger" onclick="deleteCampaign()">Delete</button></div><div class="grid2">${field('Campaign key',c.key,"let c=currentCampaign();c.key=keyify(this.value);this.value=c.key;renderInspector()")}${field('Title',c.title,"currentCampaign().title=this.value;renderSidebar();renderInspector()")}</div>${area('Description',c.description,"currentCampaign().description=this.value") }<div class="grid2">${selectField('Start node',(c.nodes||[]).map(x=>x.id),c.start_node,"currentCampaign().start_node=this.value") }<div class="field"><label>Publishing</label><div class="check"><input type="checkbox" ${c.is_active?'checked':''} onchange="currentCampaign().is_active=this.checked"><span>Active in the bot</span></div></div></div>${renderConditions(c.requirements,'currentCampaign().requirements')}</div>${n?renderNode(c,n):'<div class="empty">Add a node to this campaign.</div>'}`;
}

function renderNode(c,n){
  return `<div class="section"><div class="row-head"><h2>Selected Node</h2><button class="danger" onclick="deleteNode()">Delete Node</button></div><div class="grid3">${field('Node ID',n.id,"let n=currentNode();let old=n.id;n.id=keyify(this.value);this.value=n.id;if(currentCampaign().start_node===old)currentCampaign().start_node=n.id;renderSidebar();renderInspector()")}${selectField('Type',['quest','choice','ending'],n.type,"currentNode().type=this.value;render()")}${field('Title',n.title,"currentNode().title=this.value;renderSidebar();renderInspector()")}</div>${area('Story summary / player-facing text',n.description,"currentNode().description=this.value")}${renderConditions(n.requirements,'currentNode().requirements')}${n.type==='quest'?renderQuest(n):n.type==='choice'?renderEdges(n,'options'):renderEnding(n)}${n.type!=='choice'&&n.type!=='ending'?renderEdges(n,'next'):''}${renderConsequences(n)}</div>`
}

function renderQuest(n){let qst=n.quest||(n.quest={});qst.objective=qst.objective||{source:'none',mode:'progress',required_count:0};qst.turnin=qst.turnin||{type:'progress'};qst.reward=qst.reward||{type:'none'};qst.requirements=qst.requirements||[];
 return `<div class="section"><h3>Quest</h3><div class="grid2">${field('Quest key (blank = campaign_node)',qst.quest_key||'',"currentNode().quest.quest_key=keyify(this.value);this.value=currentNode().quest.quest_key")}${field('Category',qst.category||cTitle(),"currentNode().quest.category=this.value")}</div>${area('Offer text',qst.offer_text||'',"currentNode().quest.offer_text=this.value")}${area('Turn-in text',qst.turnin_text||'',"currentNode().quest.turnin_text=this.value")}${renderConditions(qst.requirements,'currentNode().quest.requirements')}<div class="grid3">${selectField('Objective source',sources,qst.objective.source||'none',"currentNode().quest.objective.source=this.value")}${selectField('Objective mode',['progress','key_item'],qst.objective.mode||'progress',"currentNode().quest.objective.mode=this.value;render()")}${field('Required clears',qst.objective.required_count||0,"currentNode().quest.objective.required_count=Number(this.value)",'number')}</div><div class="grid2">${field('Target monster/floor (optional)',qst.objective.target_name||'',"currentNode().quest.objective.target_name=this.value")}${selectField('Turn-in type',['progress','key_item','crate','egg','money'],qst.turnin.type||'progress',"currentNode().quest.turnin.type=this.value")}</div>${qst.objective.mode==='key_item'?`<div class="grid3">${field('Key item key',qst.objective.key_item_key||'',"currentNode().quest.objective.key_item_key=keyify(this.value)")}${field('Key item name',qst.objective.key_item_name||'',"currentNode().quest.objective.key_item_name=this.value")}${field('Required quantity',qst.objective.key_item_required_quantity||1,"currentNode().quest.objective.key_item_required_quantity=Number(this.value)",'number')}</div><div class="grid3">${field('Drop chance %',qst.objective.drop_chance_percent??100,"currentNode().quest.objective.drop_chance_percent=Number(this.value)",'number')}${field('Drop min',qst.objective.drop_quantity_min||1,"currentNode().quest.objective.drop_quantity_min=Number(this.value)",'number')}${field('Drop max',qst.objective.drop_quantity_max||1,"currentNode().quest.objective.drop_quantity_max=Number(this.value)",'number')}</div>`:''}${renderReward(qst.reward)}${renderCutscenes(n)}${renderEncounter(n)}</div>`}
function cTitle(){return currentCampaign()?.title||'Campaign'}

function renderReward(r){let type=r.type||'none';let body='';if(type==='money')body=field('Gold amount',r.amount||0,"currentNode().quest.reward.amount=Number(this.value)",'number');if(type==='crate')body=`<div class="grid2">${selectField('Rarity',['common','uncommon','rare','magic','legendary','fortune','divine','materials'],r.rarity||'common',"currentNode().quest.reward.rarity=this.value")}${field('Amount',r.amount||1,"currentNode().quest.reward.amount=Number(this.value)",'number')}</div>`;if(type==='egg')body=field('Monster name',r.monster_name||'',"currentNode().quest.reward.monster_name=this.value") .replace('<input','<input list="monsterNames"');if(type==='item')body=`<div class="grid3">${field('Item name',r.name||'',"currentNode().quest.reward.name=this.value")}${field('Item type',r.item_type||'Sword',"currentNode().quest.reward.item_type=this.value")}${field('Stat',r.stat||1,"currentNode().quest.reward.stat=Number(this.value)",'number')}</div><div class="grid2">${field('Element',r.element||'Light',"currentNode().quest.reward.element=this.value")}${field('Value',r.value||0,"currentNode().quest.reward.value=Number(this.value)",'number')}</div>`;if(type==='bundle')body=area('Reward array JSON',JSON.stringify(r.rewards||[],null,2),"currentNode().quest.reward.rewards=parseJSON(this.value,[])");return `<div class="section"><h3>Reward / Special Drop</h3>${selectField('Reward type',rewardTypes,type,"currentNode().quest.reward={type:this.value};render()")}${body}</div>`}

function renderCutscenes(n){return `<div class="section"><h3>Cutscenes</h3>${renderCutsceneSlot(n,'accept','Before quest')}${renderCutsceneSlot(n,'turnin','After turn-in')}</div>`}
function renderCutsceneSlot(n,slot,label){let cs=n.cutscenes[slot];if(!cs)return `<button onclick="addCutscene('${slot}')">+ Add ${esc(label)} cutscene</button>`;cs.pages=cs.pages||[];return `<div class="row"><div class="row-head"><strong>${esc(label)}</strong><button class="mini danger" onclick="delete currentNode().cutscenes['${slot}'];render()">Remove</button></div>${field('Cutscene title',cs.title||'',`currentNode().cutscenes['${slot}'].title=this.value`)}${cs.pages.map((p,i)=>`<div class="row"><div class="row-head"><strong>Page ${i+1}</strong><button class="mini danger" onclick="currentNode().cutscenes['${slot}'].pages.splice(${i},1);render()">Delete</button></div>${field('Page title',p.title||'',`currentNode().cutscenes['${slot}'].pages[${i}].title=this.value`)}${field('Subtitle',p.subtitle||'',`currentNode().cutscenes['${slot}'].pages[${i}].subtitle=this.value`)}${area('Text',p.text||'',`currentNode().cutscenes['${slot}'].pages[${i}].text=this.value`)}${field('Image URL',p.image||'',`currentNode().cutscenes['${slot}'].pages[${i}].image=this.value`)}</div>`).join('')}<button onclick="currentNode().cutscenes['${slot}'].pages.push({title:'',subtitle:'',text:'',image:''});render()">+ Add Page</button></div>`}
function addCutscene(slot){currentNode().cutscenes[slot]={title:currentNode().title,pages:[{title:currentNode().title,subtitle:'',text:'',image:''}]};render()}

function renderEncounter(n){let e=n.encounter||(n.encounter={kind:'none',party:{min:1,max:1},settings:{}});e.party=e.party||{min:1,max:1};return `<div class="section"><h3>Encounter / Battle Bridge</h3><div class="grid3">${selectField('Encounter kind',encounterKinds,e.kind||'none',"currentNode().encounter.kind=this.value")}${field('Encounter name',e.name||'',"currentNode().encounter.name=this.value")}${field('Monster / boss',e.monster||'',"currentNode().encounter.monster=this.value").replace('<input','<input list="monsterNames"')}</div><div class="grid3">${field('Minimum party',e.party.min||1,"currentNode().encounter.party.min=Number(this.value)",'number')}${field('Maximum party',e.party.max||1,"currentNode().encounter.party.max=Number(this.value)",'number')}${field('Discord launch command',e.launch_command||'',"currentNode().encounter.launch_command=this.value")}</div>${area('Encounter description',e.description||'',"currentNode().encounter.description=this.value")}${area('Future battle settings JSON',JSON.stringify(e.settings||{},null,2),"currentNode().encounter.settings=parseJSON(this.value,{})")}</div>`}

function renderEdges(n,property){let edges=n[property]||(n[property]=[]);let targetIds=(currentCampaign().nodes||[]).map(x=>x.id);return `<div class="section"><h3>${property==='options'?'Branch Choices':'Next Nodes'}</h3>${edges.map((e,i)=>`<div class="row"><div class="row-head"><strong>${property==='options'?'Choice':'Transition'} ${i+1}</strong><button class="mini danger" onclick="currentNode()['${property}'].splice(${i},1);render()">Delete</button></div><div class="grid2">${field('Button label',e.label||'Continue',`currentNode()['${property}'][${i}].label=this.value`)}${selectField('Target node',targetIds,e.target||'',`currentNode()['${property}'][${i}].target=this.value`)}</div>${area('Choice description',e.description||'',`currentNode()['${property}'][${i}].description=this.value`)}${renderConditions(e.conditions||(e.conditions=[]),`currentNode()['${property}'][${i}].conditions`)}${area('Effects JSON (reputation/unlocks)',JSON.stringify(e.effects||[],null,2),`currentNode()['${property}'][${i}].effects=parseJSON(this.value,[])`)}</div>`).join('')}<button onclick="currentNode()['${property}'].push({label:'Continue',target:(currentCampaign().nodes[0]||{}).id||'',description:'',conditions:[],effects:[],unlocks:[]});render()">+ Add ${property==='options'?'Choice':'Transition'}</button></div>`}
function renderEnding(n){return `<div class="section"><h3>Ending</h3><p>This node completes the campaign and records its unlocks and reputation effects.</p></div>`}
function renderConsequences(n){return `<div class="section"><h3>Permanent Consequences</h3>${field('Unlock keys (comma separated)',(n.unlocks||[]).map(x=>typeof x==='string'?x:x.key).join(', '),"currentNode().unlocks=this.value.split(',').map(x=>x.trim()).filter(Boolean)")}${area('Effects JSON',JSON.stringify(n.effects||[],null,2),"currentNode().effects=parseJSON(this.value,[])")}<small>Example reputation effect: [{"type":"reputation","key":"evil","points":25,"rank_delta":1}]</small></div>`}

function renderConditions(list,path){return `<div class="section"><div class="row-head"><h3>Requirements</h3><button class="mini" onclick="${path}.push({type:'quest_completed',key:'',operator:'>=',value:1,description:''});render()">+ Requirement</button></div>${list.length?list.map((c,i)=>`<div class="row"><div class="row-head"><strong>Requirement ${i+1}</strong><button class="mini danger" onclick="${path}.splice(${i},1);render()">Delete</button></div><div class="grid3">${selectField('Type',conditionTypes,c.type||'quest_completed',`${path}[${i}].type=this.value`)}${field('Key / name',c.key||'',`${path}[${i}].key=this.value`)}${selectField('Compare',['>=','>','==','!=','<=','<','contains'],c.operator||'>=',`${path}[${i}].operator=this.value`)}</div><div class="grid2">${field('Value / required rank',c.value??1,`${path}[${i}].value=this.value`)}${field('Failure message (optional)',c.description||'',`${path}[${i}].description=this.value`)}</div></div>`).join(''):'<div class="empty">No requirements. This content is open when reached.</div>'}</div>`}

function addMonster(){data.monsters.push({key:'new_monster',name:'New Monster',tier:1,hp:100,attack:20,defense:10,element:'Nature',url:'',tags:[]});selectedMonster=data.monsters.length-1;render()}
function addStandaloneQuest(){data.standalone_quests.push({quest_key:'new_quest',name:'New Quest',category:'General',short_description:'',offer_text:'',turnin_text:'',objective:{source:'none',mode:'progress',required_count:0,target_name:''},turnin:{type:'progress'},reward:{type:'none'},access:{conditions:[]},prerequisites:[],accept_cutscene_key:'',turnin_cutscene_key:'',repeatable:false,is_active:false});selectedQuest=data.standalone_quests.length-1;render()}
function renderStandaloneQuest(){let s=(data.standalone_quests||[])[selectedQuest];if(!s){main.innerHTML='<div class="empty">Add or import a standalone quest. Campaign quest nodes are edited in Flow.</div>';return}s.objective=s.objective||{source:'none',mode:'progress',required_count:0};s.turnin=s.turnin||{type:'progress'};s.reward=s.reward||{type:'none'};s.access=s.access||{};s.access.conditions=s.access.conditions||[];main.innerHTML=`<div class="section"><div class="row-head"><h2>Standalone Quest</h2><button class="danger" onclick="data.standalone_quests.splice(selectedQuest,1);selectedQuest=Math.max(0,selectedQuest-1);render()">Delete</button></div><div class="grid3">${field('Quest key',s.quest_key||'',"let s=data.standalone_quests[selectedQuest];s.quest_key=keyify(this.value);this.value=s.quest_key")}${field('Name',s.name||'',"data.standalone_quests[selectedQuest].name=this.value;renderSidebar()")}${field('Category',s.category||'General',"data.standalone_quests[selectedQuest].category=this.value")}</div>${area('Journal description',s.short_description||'',"data.standalone_quests[selectedQuest].short_description=this.value")}${area('Offer text',s.offer_text||'',"data.standalone_quests[selectedQuest].offer_text=this.value")}${area('Turn-in text',s.turnin_text||'',"data.standalone_quests[selectedQuest].turnin_text=this.value")}<div class="grid3">${selectField('Objective source',sources,s.objective.source||'none',"data.standalone_quests[selectedQuest].objective.source=this.value")}${selectField('Objective mode',['progress','key_item'],s.objective.mode||'progress',"data.standalone_quests[selectedQuest].objective.mode=this.value")}${field('Required count',s.objective.required_count||0,"data.standalone_quests[selectedQuest].objective.required_count=Number(this.value)",'number')}</div><div class="grid2">${field('Target monster/floor',s.objective.target_name||'',"data.standalone_quests[selectedQuest].objective.target_name=this.value")}${selectField('Turn-in type',['progress','key_item','crate','egg','money'],s.turnin.type||'progress',"data.standalone_quests[selectedQuest].turnin.type=this.value")}</div>${area('Objective JSON (advanced)',JSON.stringify(s.objective,null,2),"data.standalone_quests[selectedQuest].objective=parseJSON(this.value,{})")}${area('Turn-in JSON (advanced)',JSON.stringify(s.turnin,null,2),"data.standalone_quests[selectedQuest].turnin=parseJSON(this.value,{})")}${area('Reward JSON',JSON.stringify(s.reward,null,2),"data.standalone_quests[selectedQuest].reward=parseJSON(this.value,{type:'none'})")}${renderConditions(s.access.conditions,'data.standalone_quests[selectedQuest].access.conditions')}<div class="grid2">${field('Prerequisite quest keys (comma separated)',(s.prerequisites||[]).join(', '),"data.standalone_quests[selectedQuest].prerequisites=this.value.split(',').map(x=>keyify(x)).filter(Boolean)")}${field('Accept cutscene key',s.accept_cutscene_key||'',"data.standalone_quests[selectedQuest].accept_cutscene_key=keyify(this.value)")}</div>${field('Turn-in cutscene key',s.turnin_cutscene_key||'',"data.standalone_quests[selectedQuest].turnin_cutscene_key=keyify(this.value)")}<div class="grid2"><div class="check"><input type="checkbox" ${s.repeatable?'checked':''} onchange="data.standalone_quests[selectedQuest].repeatable=this.checked"><span>Repeatable</span></div><div class="check"><input type="checkbox" ${s.is_active?'checked':''} onchange="data.standalone_quests[selectedQuest].is_active=this.checked"><span>Active</span></div></div></div>`}
function renderMonster(){let m=data.monsters[selectedMonster];if(!m){main.innerHTML='<div class="empty">Add or import a monster.</div>';return}main.innerHTML=`<div class="section"><div class="row-head"><h2>Monster Creator</h2><button class="danger" onclick="data.monsters.splice(selectedMonster,1);selectedMonster=Math.max(0,selectedMonster-1);render()">Delete</button></div><div class="grid2">${field('Monster key',m.key||'',"let m=data.monsters[selectedMonster];m.key=keyify(this.value);this.value=m.key")}${field('Name',m.name||'',"data.monsters[selectedMonster].name=this.value;renderSidebar();renderMonsterList()")}</div><div class="grid3">${field('Tier',m.tier||1,"data.monsters[selectedMonster].tier=Number(this.value)",'number')}${field('HP',m.hp||100,"data.monsters[selectedMonster].hp=Number(this.value)",'number')}${field('Attack',m.attack||20,"data.monsters[selectedMonster].attack=Number(this.value)",'number')}</div><div class="grid3">${field('Defense',m.defense||10,"data.monsters[selectedMonster].defense=Number(this.value)",'number')}${field('Element',m.element||'Nature',"data.monsters[selectedMonster].element=this.value")}${field('Tags (comma separated)',(m.tags||[]).join(', '),"data.monsters[selectedMonster].tags=this.value.split(',').map(x=>x.trim()).filter(Boolean)")}</div>${field('Image URL',m.url||'',"data.monsters[selectedMonster].url=this.value")}</div>`}

function renderJson(){main.innerHTML=`<div class="section"><h2>Raw Package JSON</h2><p>Useful for advanced fields. Changes apply when the textarea loses focus.</p><textarea style="min-height:70vh;font-family:ui-monospace,monospace" onchange="let parsed=parseJSON(this.value,null);if(parsed){data=parsed;selectedCampaign=selectedNode=selectedMonster=0;render()}else alert('Invalid JSON')">${esc(JSON.stringify(data,null,2))}</textarea></div>`}
function renderInspector(){let c=currentCampaign(),n=currentNode();if(tab==='quests'){let s=(data.standalone_quests||[])[selectedQuest];inspector.innerHTML=s?`<h3>${esc(s.name)}</h3><p>${esc(s.short_description||'Standalone quest')}</p><span class="pill">${s.is_active?'active':'draft'}</span><span class="pill">${esc(s.objective?.source||'none')}</span><div id="validationStatus"></div>`:'<p>No quest selected.</p>';return}if(tab==='monsters'){let m=data.monsters[selectedMonster];inspector.innerHTML=m?`<h3>${esc(m.name)}</h3><p>Tier ${esc(m.tier)} ${esc(m.element)}</p><p>HP ${esc(m.hp)}<br>ATK ${esc(m.attack)}<br>DEF ${esc(m.defense)}</p>`:'<p>No monster selected.</p>';return}if(!c){inspector.innerHTML='<p>No campaign selected.</p>';return}let links=n?((n.type==='choice'?n.options:n.next)||[]):[];inspector.innerHTML=`<h3>${esc(c.title)}</h3><p>${esc(c.description)}</p><span class="pill">${c.is_active?'active':'draft'}</span><span class="pill">${c.nodes.length} nodes</span>${n?`<hr style="border-color:var(--line)"><h3>${esc(n.title)}</h3><span class="pill">${esc(n.type)}</span><p>${esc(n.description)}</p><strong>Flows to</strong><p>${links.length?links.map(x=>`<span class="pill">${esc(x.target)}</span>`).join(''):'Ending / unlinked'}</p>`:''}<div id="validationStatus"></div>`}

function validatePackage(){let errors=[];if(data.schema!==SCHEMA)errors.push('Wrong schema.');if(data.schema_version!==1)errors.push('schema_version must be 1.');let campaignKeys=new Set(),questKeys=new Set(),monsterNames=new Set();for(let c of data.campaigns||[]){ensureCampaign(c);if(!c.key)errors.push('A campaign has no key.');if(campaignKeys.has(c.key))errors.push(`Duplicate campaign key: ${c.key}`);campaignKeys.add(c.key);let ids=new Set();for(let n of c.nodes){if(!n.id)errors.push(`${c.key}: node without ID`);if(ids.has(n.id))errors.push(`${c.key}: duplicate node ${n.id}`);ids.add(n.id)}if(!ids.has(c.start_node))errors.push(`${c.key}: start node ${c.start_node} does not exist`);for(let n of c.nodes){let edges=n.type==='choice'?n.options:n.next;for(let e of edges||[])if(!ids.has(e.target))errors.push(`${c.key}/${n.id}: missing target ${e.target}`);if(n.type==='choice'&&(n.options||[]).length<2)errors.push(`${c.key}/${n.id}: choice needs at least 2 options`);if(n.type==='quest'){let qk=keyify(n.quest.quest_key||`${c.key}_${n.id}`);if(questKeys.has(qk))errors.push(`Duplicate quest key: ${qk}`);questKeys.add(qk);let p=n.encounter?.party||{};if(Number(p.min||1)>Number(p.max||1))errors.push(`${qk}: party minimum exceeds maximum`)}}}for(let m of data.monsters||[]){m.key=keyify(m.key||m.name);if(!m.name)errors.push('A monster has no name.');if(monsterNames.has(String(m.name).toLowerCase()))errors.push(`Duplicate monster: ${m.name}`);monsterNames.add(String(m.name).toLowerCase())}return errors}
function validateAndShow(){let errors=validatePackage();let status=document.getElementById('validationStatus');if(status)status.innerHTML=`<div class="status ${errors.length?'bad':'good'}">${errors.length?esc(errors.join('\n')):'Valid. Ready to download and import into the bot.'}</div>`;else alert(errors.length?errors.join('\n'):'Valid. Ready to download.')}
function downloadPackage(){let errors=validatePackage();if(errors.length&&!confirm(`There are ${errors.length} validation errors. Download anyway?`))return;data.exported_at=new Date().toISOString();data.reference={objective_sources:sources,condition_types:conditionTypes,encounter_kinds:encounterKinds,reward_types:rewardTypes,monster_names:data.monsters.map(x=>x.name).sort()};let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`fablereborn-content-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href)}
fileInput.addEventListener('change',async e=>{let f=e.target.files[0];if(!f)return;try{let parsed=JSON.parse(await f.text());data=parsed;data.campaigns=data.campaigns||[];data.standalone_quests=data.standalone_quests||[];data.cutscenes=data.cutscenes||[];data.monsters=data.monsters||[];selectedCampaign=selectedNode=selectedMonster=0;render()}catch(err){alert('Could not import JSON: '+err.message)}e.target.value=''})
render();
</script>
